<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chamados TI — Oxipress</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen flex items-center justify-center p-4">
<div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
    </div>
    <h1 class="text-2xl font-bold text-slate-800">Chamados TI</h1>
    <p class="text-slate-500 text-sm mt-1">Oxipress — Suporte de Tecnologia</p>
  </div>
  <div id="erro" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg"></div>
  <form id="form" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
      <input id="email" type="email" placeholder="seu@email.com" autocomplete="email"
        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
      <div class="relative">
        <input id="senha" type="password" placeholder="••••••••" autocomplete="current-password"
          class="w-full border border-slate-300 rounded-lg px-3 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button type="button" id="toggleSenha" tabindex="-1"
          class="absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 hover:text-slate-700"
          aria-label="Mostrar senha">
          <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
          </svg>
        </button>
      </div>
      <a href="#" id="linkEsqueceuSenha" class="text-xs text-blue-600 hover:underline mt-1 inline-block">Esqueceu a senha?</a>
    </div>
    <button type="submit" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition">
      Entrar
    </button>
  </form>
    <div id="secaoEsqueceuSenha" class="hidden mt-4 p-4 bg-slate-50 rounded-lg border border-slate-200">
      <p class="text-sm font-medium text-slate-700 mb-1">Redefinir senha</p>
      <p class="text-xs text-slate-500 mb-3">Digite seu e-mail para receber o link de redefinição.</p>
      <input id="emailReset" type="email" placeholder="seu@email.com"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 mb-2">
      <button id="btnEnviarReset" type="button"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-2 rounded-lg transition">
        Enviar link de redefinição
      </button>
      <div id="msgReset" class="hidden mt-2 text-sm rounded p-2"></div>
    </div>
</div>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const erroEl = document.getElementById('erro');
  const btn = document.getElementById('btn');
  erroEl.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const res = await fetch('/api/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email: document.getElementById('email').value, senha: document.getElementById('senha').value })
  });
  const data = await res.json();
  if (!res.ok) { erroEl.textContent = data.erro; erroEl.classList.remove('hidden'); btn.disabled=false; btn.textContent='Entrar'; return; }
  localStorage.setItem('oxi_token', data.token);
  localStorage.setItem('oxi_usuario', JSON.stringify(data.usuario));
  window.location.href = data.usuario.role === 'admin' ? '/admin.html' : '/app.html';
});
// Já logado?
const t = localStorage.getItem('oxi_token');
if (t) {
  const u = JSON.parse(localStorage.getItem('oxi_usuario')||'{}');
  if (u.role==='admin') window.location.href='/admin.html';
  else if (u.id) window.location.href='/app.html';
}


// Toggle visualizar senha
document.getElementById('toggleSenha').addEventListener('click', function() {
  var inp = document.getElementById('senha');
  var open = document.getElementById('eyeOpen');
  var closed = document.getElementById('eyeClosed');
  if (inp.type === 'password') {
    inp.type = 'text';
    open.classList.add('hidden');
    closed.classList.remove('hidden');
  } else {
    inp.type = 'password';
    open.classList.remove('hidden');
    closed.classList.add('hidden');
  }
});

// Esqueceu a senha
document.getElementById('linkEsqueceuSenha').addEventListener('click', function(e) {
  e.preventDefault();
  var sec = document.getElementById('secaoEsqueceuSenha');
  sec.classList.toggle('hidden');
  if (!sec.classList.contains('hidden')) document.getElementById('emailReset').focus();
});

document.getElementById('btnEnviarReset').addEventListener('click', async function() {
  var email = document.getElementById('emailReset').value.trim();
  var msg = document.getElementById('msgReset');
  var btn = document.getElementById('btnEnviarReset');
  msg.classList.add('hidden');
  if (!email) {
    msg.textContent = 'Digite seu e-mail.';
    msg.className = 'mt-2 text-sm rounded p-2 bg-red-50 border border-red-200 text-red-700';
    msg.classList.remove('hidden'); return;
  }
  btn.disabled = true; btn.textContent = 'Enviando...';
  await fetch('/api/auth/forgot-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ email: email })
  });
  btn.disabled = false; btn.textContent = 'Enviar link de redefinição';
  msg.textContent = 'Se o e-mail estiver cadastrado, você receberá o link em instantes.';
  msg.className = 'mt-2 text-sm rounded p-2 bg-green-50 border border-green-200 text-green-700';
  msg.classList.remove('hidden');
});
</script>
</body>
</html>
