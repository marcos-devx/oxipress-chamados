<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chamados TI — Oxipress</title>
<script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  .nav-link{@apply flex items-center gap-2.5 px-3 py-2.5 rounded-lg text-sm font-medium transition text-white hover:text-white hover:bg-slate-800;color:#fff}
  .nav-link.active{@apply bg-slate-800 text-white}
</style>
</head>
<body class="bg-slate-100 min-h-screen">

<div id="layout" class="hidden flex min-h-screen">
  <!-- Sidebar -->
  <aside class="w-60 bg-slate-900 flex flex-col flex-shrink-0 hidden md:flex">
    <div class="p-4 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-600 rounded-lg flex-shrink-0 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <div><p class="font-bold text-white text-sm">Chamados TI</p><p class="text-xs text-slate-400" id="sb-setor"></p></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <button onclick="ir('inicio')" id="nav-inicio" class="nav-link w-full text-left active">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Início
      </button>
      <button onclick="ir('chamados')" id="nav-chamados" class="nav-link w-full text-left">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Meus Chamados
      </button>
        <button onclick="ir('sugestoes')" id="nav-sugestoes" class="nav-link w-full text-left">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        Sugestões
      </button>
      <button onclick="ir('notificacoes')" id="nav-notif" class="nav-link w-full text-left">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        Notificações
        <span id="badge-notif" class="hidden ml-auto bg-red-500 text-white text-xs rounded-full px-1.5 py-0.5"></span>
      </button>
    </nav>
    <div class="p-3 border-t border-slate-700 space-y-1">
      <button onclick="ir('perfil')" id="nav-perfil" class="nav-link w-full text-left">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Perfil
      </button>
      <button onclick="logout()" class="nav-link w-full text-left">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sair
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Mobile header -->
    <header class="md:hidden bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between">
      <h1 class="font-bold text-slate-800">Chamados TI</h1>
      <div class="flex gap-2">
        <button onclick="ir('notificacoes')" class="relative p-2 text-slate-500">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span id="badge-notif-m" class="hidden absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
      </div>
    </header>
    <!-- Mobile nav -->
    <nav class="md:hidden bg-white border-b border-slate-200 flex overflow-x-auto">
      <button onclick="ir('inicio')" class="flex-1 min-w-0 py-2.5 text-xs font-medium text-blue-600 border-b-2 border-blue-600 flex flex-col items-center gap-0.5" id="mnav-inicio">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Início
      </button>
      <button onclick="ir('chamados')" class="flex-1 min-w-0 py-2.5 text-xs font-medium text-slate-500 flex flex-col items-center gap-0.5" id="mnav-chamados">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Chamados
      </button>
      <button onclick="ir('sugestoes')" class="flex-1 min-w-0 py-2.5 text-xs font-medium text-slate-500 flex flex-col items-center gap-0.5" id="mnav-sugestoes">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
        Sugestões
      </button>
      <button onclick="ir('perfil')" class="flex-1 min-w-0 py-2.5 text-xs font-medium text-slate-500 flex flex-col items-center gap-0.5" id="mnav-perfil">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        Perfil
      </button>
    </nav>

    <main class="flex-1 overflow-auto">

      <!-- INÍCIO -->
      <section id="sec-inicio" class="p-5 max-w-4xl mx-auto">
        <div class="mb-6 flex items-center justify-between">
          <div><h2 class="text-xl font-bold text-slate-800">Olá, <span id="nome-usuario"></span> 👋</h2><p class="text-slate-500 text-sm" id="setor-cargo"></p></div>
          <button onclick="ir('chamados'); setTimeout(()=>mostrarFormChamado(),100)"
            class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg flex items-center gap-1.5 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Novo Chamado
          </button>
        </div>
        <div id="cards-inicio" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div class="bg-white rounded-xl border border-slate-200 p-5">
            <h3 class="font-semibold text-slate-800 mb-4">Chamados Recentes</h3>
            <div id="recentes-inicio" class="space-y-3"></div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-5">
            <h3 class="font-semibold text-slate-800 mb-4">Aguardando Avaliação</h3>
            <div id="avaliar-inicio" class="space-y-3"></div>
          </div>
        </div>
      </section>

      <!-- CHAMADOS -->
      <section id="sec-chamados" class="hidden p-5 max-w-5xl mx-auto">
        <!-- Novo chamado form -->
        <div id="form-container" class="hidden bg-white rounded-xl border border-slate-200 p-6 mb-5">
          <h3 class="text-lg font-semibold text-slate-800 mb-4">Abrir Novo Chamado</h3>
          <div id="erro-form" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg"></div>
          <form id="form-chamado" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Categoria *</label>
                <select id="f-cat" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="">Selecione...</option>
                  <option>Hardware</option><option>Software</option><option>Rede / Internet</option>
                  <option>Acesso / Senha</option><option>Impressora</option><option>E-mail</option>
                  <option>Sistema Interno</option><option>Outros</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Urgência</label>
                <select id="f-prio" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option value="Baixa">🟢 Baixa — Pode aguardar</option>
                  <option value="Media" selected>🟡 Média — Precisa de atenção</option>
                  <option value="Alta">🟠 Alta — Impacta produção</option>
                  <option value="Critica">🔴 Crítica — Sistema parado</option>
                </select>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Título *</label>
              <input id="f-titulo" type="text" placeholder="Resumo do problema" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Descrição Detalhada *</label>
              <textarea id="f-desc" rows="4" placeholder="Descreva o problema com detalhes..." class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Anexar arquivo (opcional)</label>
              <input id="f-arquivo" type="file" class="w-full text-sm text-slate-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            <div class="flex gap-3">
              <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-lg text-sm transition">Enviar Chamado</button>
              <button type="button" onclick="fecharFormChamado()" class="text-slate-600 font-medium px-4 py-2.5 rounded-lg text-sm hover:bg-slate-100 transition">Cancelar</button>
            </div>
          </form>
        </div>

        <!-- Sucesso -->
        <div id="sucesso-container" class="hidden bg-green-50 border border-green-200 rounded-xl p-5 mb-5 text-center">
          <div class="text-3xl mb-2">✅</div>
          <h3 class="font-bold text-green-800">Chamado aberto!</h3>
          <p class="text-green-700 text-sm mt-1">Protocolo: <strong id="protocolo-novo"></strong></p>
          <p class="text-green-600 text-xs mt-1">A equipe de TI foi notificada.</p>
          <button onclick="document.getElementById('sucesso-container').classList.add('hidden')" class="mt-3 bg-green-600 text-white px-4 py-1.5 rounded-lg text-sm">OK</button>
        </div>

        <!-- Filtros + Lista -->
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
          <h2 class="text-lg font-semibold text-slate-800">Meus Chamados</h2>
          <div class="flex gap-2 flex-wrap">
            <input id="busca-c" type="text" placeholder="Buscar..." oninput="carregarChamados()"
              class="border border-slate-300 rounded-lg px-3 py-1.5 text-sm w-40 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <select id="fil-status" onchange="carregarChamados()" class="border border-slate-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Todos</option>
                          <option>Aberto</option><option>Em Andamento</option><option>Aguardando Usuario</option>
                                      </select>
            <button onclick="mostrarFormChamado()" class="bg-blue-600 text-white text-sm px-3 py-1.5 rounded-lg hover:bg-blue-700 transition">+ Novo</button>
          </div>
        </div>
        <div id="lista-chamados" class="space-y-3"></div>

        <!-- Detalhe chamado -->
        <div id="detalhe-chamado" class="hidden">
          <button onclick="voltarChamados()" class="flex items-center gap-1 text-sm text-slate-500 hover:text-blue-600 mb-4">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Voltar
          </button>
          <div id="detalhe-conteudo"></div>
        </div>
      </section>

      <!-- SUGESTÕES -->
      <section id="sec-sugestoes" class="hidden p-5 max-w-4xl mx-auto">
        <div id="form-sug-container" class="hidden bg-white rounded-xl border border-slate-200 p-6 mb-5">
          <h3 class="text-lg font-semibold text-slate-800 mb-4">Nova Sugestão</h3>
          <form id="form-sug" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Categoria</label>
                <select id="s-cat" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                  <option>Processo</option><option>TI</option><option>Infraestrutura</option><option>RH</option><option>Atendimento</option><option>Outros</option>
                </select>
              </div>
              <div></div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Título *</label>
              <input id="s-titulo" type="text" placeholder="Resumo da sugestão" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Descrição *</label>
              <textarea id="s-desc" rows="4" placeholder="Descreva sua ideia ou sugestão de melhoria..." class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
            </div>
            <div class="flex gap-3">
              <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2.5 rounded-lg text-sm transition">Enviar Sugestão</button>
              <button type="button" onclick="document.getElementById('form-sug-container').classList.add('hidden')" class="text-slate-600 font-medium px-4 py-2.5 rounded-lg text-sm hover:bg-slate-100 transition">Cancelar</button>
            </div>
          </form>
        </div>
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold text-slate-800">Minhas Sugestões</h2>
          <button onclick="document.getElementById('form-sug-container').classList.remove('hidden')" class="bg-blue-600 text-white text-sm px-3 py-1.5 rounded-lg hover:bg-blue-700 transition">+ Nova</button>
        </div>
        <div id="lista-sugestoes" class="space-y-3"></div>
      </section>

      <!-- NOTIFICAÇÕES -->
      <section id="sec-notificacoes" class="hidden p-5 max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-lg font-semibold text-slate-800">Notificações</h2>
          <button onclick="marcarLidas()" class="text-sm text-blue-600 hover:underline">Marcar todas como lidas</button>
        </div>
        <div id="lista-notif" class="space-y-2"></div>
      </section>

      <!-- PERFIL -->
      <section id="sec-perfil" class="hidden p-5 max-w-lg mx-auto">
        <h2 class="text-lg font-semibold text-slate-800 mb-5">Meu Perfil</h2>
        <div class="bg-white rounded-xl border border-slate-200 p-6 mb-5">
          <div id="info-perfil" class="space-y-3 text-sm mb-5"></div>
          <hr class="border-slate-100 mb-5">
          <h4 class="font-semibold text-slate-800 mb-3">Alterar Senha</h4>
          <div id="erro-senha" class="hidden mb-3 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg"></div>
          <div id="ok-senha" class="hidden mb-3 p-3 bg-green-50 border border-green-200 text-green-700 text-sm rounded-lg">Senha alterada com sucesso!</div>
          <form id="form-senha" class="space-y-3">
            <input id="s-atual" type="password" placeholder="Senha atual" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input id="s-nova" type="password" placeholder="Nova senha (mín. 6 caracteres)" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2 rounded-lg text-sm transition">Salvar</button>
          </form>
        </div>
      </section>

    </main>
  </div>
</div>

<script>
let TOKEN = localStorage.getItem('oxi_token');
let USUARIO = JSON.parse(localStorage.getItem('oxi_usuario')||'null');
let secaoAtual = 'inicio';
let listando = true; // true=lista, false=detalhe

if (!TOKEN || !USUARIO) { window.location.href='/login.html'; }

const H = { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };

async function api(url, opts={}) {
  const r = await fetch(url, { headers: H, ...opts });
  if (r.status === 401) { logout(); return null; }
  return r.json();
}

function logout() { localStorage.clear(); window.location.href='/login.html'; }

// ─── Navegação ────────────────────────────────────────────────
function ir(secao) {
  secaoAtual = secao;
  ['inicio','chamados','sugestoes','notificacoes','perfil'].forEach(s => {
    const el=document.getElementById(`sec-${s}`); if(el) el.classList.add('hidden');
    const n = document.getElementById(`nav-${s}`);
    const m = document.getElementById(`mnav-${s}`);
    if (n) n.className = 'nav-link w-full text-left';
    if (m) m.className = 'flex-1 min-w-0 py-2.5 text-xs font-medium text-slate-500 flex flex-col items-center gap-0.5';
  });
  document.getElementById(`sec-${secao}`).classList.remove('hidden');
  const n = document.getElementById(`nav-${secao}`);
  const m = document.getElementById(`mnav-${secao}`);
  if (n) n.className = 'nav-link w-full text-left active bg-slate-800 text-white';
  if (m) m.className = 'flex-1 min-w-0 py-2.5 text-xs font-medium text-blue-600 border-b-2 border-blue-600 flex flex-col items-center gap-0.5';
  if (secao==='inicio')      carregarInicio();
  if (secao==='chamados')    { listando=true; mostrarLista(); carregarChamados(); }
  if (secao==='sugestoes')   carregarSugestoes();
  if (secao==='notificacoes'){ carregarNotificacoes(); }
  if (secao==='perfil')      carregarPerfil();
}

// ─── Init ─────────────────────────────────────────────────────
async function init() {
  document.getElementById('nome-usuario').textContent = USUARIO.nome.split(' ')[0];
  document.getElementById('sb-setor').textContent = USUARIO.setor;
  document.getElementById('setor-cargo').textContent = `${USUARIO.setor}${USUARIO.cargo?' · '+USUARIO.cargo:''}`;
  document.getElementById('layout').classList.remove('hidden');
  await carregarInicio();
  pollNotificacoes();
}

// ─── Início ───────────────────────────────────────────────────
async function carregarInicio() {
  const todos = await api('/api/chamados');
  if (!todos) return;
  const abertos   = todos.filter(c=>c.status==='Aberto').length;
  const andamento = todos.filter(c=>c.status==='Em Andamento').length;
  const concluidos= todos.filter(c=>c.status==='Concluido').length;
  const total = todos.length;
  document.getElementById('cards-inicio').innerHTML = [
    cardStat('Total', total, 'bg-slate-100', 'text-slate-700'),
    cardStat('Abertos', abertos, 'bg-blue-50', 'text-blue-700'),
    cardStat('Em Andamento', andamento, 'bg-amber-50', 'text-amber-700'),
    cardStat('Concluídos', concluidos, 'bg-green-50', 'text-green-700'),
  ].join('');

  const recentes = todos.slice(0,5);
  document.getElementById('recentes-inicio').innerHTML = recentes.length
    ? recentes.map(c=>`<div onclick="abrirDetalhe(${c.id})" class="flex items-center justify-between cursor-pointer hover:bg-slate-50 p-2 -mx-2 rounded-lg transition">
        <div><p class="text-sm font-medium text-slate-800 truncate max-w-[180px]">${c.titulo}</p><p class="text-xs text-slate-400">${fmtData(c.criado_em)}</p></div>
        <span class="text-xs px-2 py-0.5 rounded-full ${bs(c.status)}">${c.status}</span>
      </div>`).join('')
    : '<p class="text-slate-400 text-sm">Nenhum chamado.</p>';

  const parAvaliar = todos.filter(c=>c.status==='Concluido'&&!c.avaliacao_nota);
  document.getElementById('avaliar-inicio').innerHTML = parAvaliar.length
    ? parAvaliar.slice(0,5).map(c=>`<div onclick="abrirDetalhe(${c.id})" class="flex items-center justify-between cursor-pointer hover:bg-slate-50 p-2 -mx-2 rounded-lg transition">
        <p class="text-sm font-medium text-slate-800 truncate max-w-[200px]">${c.titulo}</p>
        <span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded-full">Avaliar ⭐</span>
      </div>`).join('')
    : '<p class="text-slate-400 text-sm">Nenhum pendente.</p>';
}

function cardStat(label, val, bg, fg) {
  return `<div class="${bg} rounded-xl p-4 transition"><p class="text-xs ${fg} opacity-75 mb-1">${label}</p><p class="text-2xl font-bold ${fg}">${val}</p></div>`;
}

// ─── Chamados ─────────────────────────────────────────────────
function mostrarFormChamado() {
  mostrarLista();
  document.getElementById('form-container').classList.remove('hidden');
}
function fecharFormChamado() {
  document.getElementById('form-container').classList.add('hidden');
  document.getElementById('form-chamado').reset();
  document.getElementById('erro-form').classList.add('hidden');
}

document.getElementById('form-chamado').addEventListener('submit', async e => {
  e.preventDefault();
  const erroEl = document.getElementById('erro-form');
  erroEl.classList.add('hidden');
  const titulo = document.getElementById('f-titulo').value.trim();
  const categoria = document.getElementById('f-cat').value;
  const descricao = document.getElementById('f-desc').value.trim();
  const prioridade = document.getElementById('f-prio').value;
  if (!titulo||!categoria||!descricao) { erroEl.textContent='Preencha todos os campos obrigatórios.'; erroEl.classList.remove('hidden'); return; }
  const r = await fetch('/api/chamados', { method:'POST', headers:H, body: JSON.stringify({titulo,categoria,descricao,prioridade}) });
  const data = await r.json();
  if (!r.ok) { erroEl.textContent=data.erro; erroEl.classList.remove('hidden'); return; }
  // Anexo
  const arquivo = document.getElementById('f-arquivo').files[0];
  if (arquivo) {
    const fd = new FormData(); fd.append('arquivo', arquivo);
    await fetch(`/api/chamados/${data.id}/anexos`, { method:'POST', headers:{'Authorization':`Bearer ${TOKEN}`}, body:fd });
  }
  fecharFormChamado();
  document.getElementById('protocolo-novo').textContent = data.protocolo;
  document.getElementById('sucesso-container').classList.remove('hidden');
  carregarChamados();
});

async function carregarChamados() {
  const busca  = document.getElementById('busca-c').value;
  const status = document.getElementById('fil-status').value;
  const p = new URLSearchParams();
  if (busca)  p.set('busca', busca);
  if (status) p.set('status', status);
  const lista = await api(`/api/chamados?${p}`);
  if (!lista) return;
  const el = document.getElementById('lista-chamados');
  if (!lista.length) { el.innerHTML = '<div class="text-center py-10 text-slate-400"><p>Nenhum chamado encontrado.</p></div>'; return; }
  el.innerHTML = lista.map(c=>`
    <div onclick="abrirDetalhe(${c.id})" class="bg-white rounded-xl border border-slate-200 p-4 cursor-pointer hover:border-blue-300 hover:shadow-sm transition">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-1.5 mb-1 flex-wrap">
            <span class="text-xs font-mono text-slate-400">${c.protocolo}</span>
            <span class="text-xs px-2 py-0.5 rounded-full font-medium ${bs(c.status)}">${c.status}</span>
            <span class="text-xs px-2 py-0.5 rounded-full font-medium ${bp(c.prioridade)}">${c.prioridade}</span>
            ${c.qtd_anexos>0?`<span class="text-xs text-slate-400">📎 ${c.qtd_anexos}</span>`:''}
          </div>
          <h3 class="font-semibold text-slate-800 truncate">${c.titulo}</h3>
          <p class="text-xs text-slate-500 mt-0.5">${c.categoria} · ${fmtData(c.criado_em)}</p>
        </div>
        <svg class="w-4 h-4 text-slate-400 flex-shrink-0 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </div>
    </div>`).join('');
}

function mostrarLista() {
  listando = true;
  document.getElementById('lista-chamados').classList.remove('hidden');
  document.getElementById('detalhe-chamado').classList.add('hidden');
  document.querySelectorAll('#sec-chamados .flex.flex-wrap').forEach(e=>e.classList.remove('hidden'));
}
function voltarChamados() { mostrarLista(); carregarChamados(); }

async function abrirDetalhe(id) {
  ir('chamados');
  listando = false;
  document.getElementById('lista-chamados').classList.add('hidden');
  document.getElementById('form-container').classList.add('hidden');
  document.getElementById('sucesso-container').classList.add('hidden');
  document.querySelectorAll('#sec-chamados .flex.flex-wrap').forEach(e=>e.classList.add('hidden'));
  document.getElementById('detalhe-chamado').classList.remove('hidden');
  const c = await api(`/api/chamados/${id}`);
  if (!c) return;
  document.getElementById('detalhe-conteudo').innerHTML = renderDetalhe(c);
}

function renderDetalhe(c) {
  const emAtraso = c.sla_limite && c.status!=='Concluido' && c.status!=='Cancelado' && new Date(c.sla_limite.replace(' ','T')) < new Date();
  const hist = (c.historico||[]).map(h=>`
    <div class="flex gap-3">
      <div class="w-2 h-2 rounded-full bg-blue-400 mt-1.5 flex-shrink-0"></div>
      <div><p class="text-sm text-slate-700">${h.descricao}</p><p class="text-xs text-slate-400 mt-0.5">${h.autor_nome} · ${fmtData(h.criado_em)}</p></div>
    </div>`).join('');
  const anexosHtml = (c.anexos||[]).map(a=>`
    <a href="/uploads/${a.nome_arquivo}" target="_blank" class="flex items-center gap-2 text-sm text-blue-600 hover:underline">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
      ${a.nome_original}
    </a>`).join('') || '<p class="text-slate-400 text-sm">Nenhum anexo.</p>';
  const avaliacaoHtml = c.status==='Concluido' ? (c.avaliacao
    ? `<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-5"><h3 class="font-semibold text-slate-800 mb-2">Sua Avaliação</h3><div class="text-2xl mb-1">${'⭐'.repeat(c.avaliacao.nota)}</div><p class="text-sm text-slate-600">${c.avaliacao.comentario||'Sem comentário.'}</p></div>`
    : `<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-5"><h3 class="font-semibold text-slate-800 mb-3">Avalie o Atendimento</h3>
       <div class="flex gap-2 mb-3" id="estrelas">${[1,2,3,4,5].map(n=>`<button onclick="selecionarNota(${n})" id="est-${n}" class="text-3xl text-slate-300 hover:text-yellow-400 transition">★</button>`).join('')}</div>
       <input type="hidden" id="nota-val" value="0">
       <textarea id="coment-aval" rows="2" placeholder="Comentário (opcional)" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-yellow-400 resize-none mb-3"></textarea>
       <button onclick="enviarAvaliacao(${c.id})" class="bg-yellow-500 hover:bg-yellow-600 text-white text-sm font-medium px-5 py-2 rounded-lg transition">Enviar Avaliação</button>
     </div>`) : '';
  const podeObs = c.status!=='Concluido'&&c.status!=='Cancelado';
  return `
    <div class="space-y-4">
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
          <div>
            <p class="text-xs font-mono text-slate-400 mb-1">${c.protocolo}</p>
            <h2 class="text-lg font-bold text-slate-800">${c.titulo}</h2>
            <p class="text-slate-500 text-sm">${c.categoria} · Setor: ${c.setor}</p>
          </div>
          <div class="flex flex-col gap-1.5 items-end">
            <span class="px-3 py-1 rounded-full text-sm font-medium ${bs(c.status)}">${c.status}</span>
            <span class="px-3 py-1 rounded-full text-sm font-medium ${bp(c.prioridade)}">${c.prioridade}</span>
            ${emAtraso?'<span class="px-2 py-0.5 bg-red-100 text-red-700 text-xs rounded-full">⚠️ Em atraso</span>':''}
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div><h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Descrição</h4><p class="text-sm text-slate-700 bg-slate-50 rounded-lg p-3">${c.descricao}</p></div>
          <div>
            <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">Informações</h4>
            <div class="bg-slate-50 rounded-lg p-3 space-y-1.5 text-sm">
              <div class="flex justify-between"><span class="text-slate-500">Abertura</span><span>${fmtData(c.criado_em)}</span></div>
              ${c.responsavel_nome?`<div class="flex justify-between"><span class="text-slate-500">Responsável</span><span>${c.responsavel_nome}</span></div>`:''}
              ${c.sla_limite?`<div class="flex justify-between"><span class="text-slate-500">SLA</span><span class="${emAtraso?'text-red-600 font-medium':''}">${fmtData(c.sla_limite)}</span></div>`:''}
            </div>
          </div>
        </div>
      </div>
      ${avaliacaoHtml}
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <h3 class="font-semibold text-slate-800 mb-3">Anexos</h3>
        <div class="space-y-2">${anexosHtml}</div>
        ${podeObs?`<div class="mt-3"><label class="block text-sm font-medium text-slate-700 mb-1">Adicionar anexo</label>
          <div class="flex gap-2"><input type="file" id="novo-anexo" class="text-sm text-slate-500 flex-1 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:text-xs file:bg-blue-50 file:text-blue-700">
          <button onclick="enviarAnexo(${c.id})" class="bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm px-3 py-1.5 rounded-lg">Enviar</button></div></div>`:''}
      </div>
      ${podeObs?`<div class="bg-white rounded-xl border border-slate-200 p-5">
        <h3 class="font-semibold text-slate-800 mb-3">Adicionar Observação</h3>
        <textarea id="txt-obs" rows="3" placeholder="Informação adicional para a equipe de TI..." class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none mb-3"></textarea>
        <button onclick="enviarObs(${c.id})" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition">Enviar</button>
      </div>`:''}
      <div class="bg-white rounded-xl border border-slate-200 p-5">
        <h3 class="font-semibold text-slate-800 mb-4">Histórico</h3>
        <div class="space-y-3 border-l-2 border-slate-100 pl-4">${hist||'<p class="text-slate-400 text-sm">Sem histórico.</p>'}</div>
      </div>
    </div>`;
}

function selecionarNota(n) {
  document.getElementById('nota-val').value = n;
  for(let i=1;i<=5;i++) document.getElementById(`est-${i}`).className = `text-3xl transition ${i<=n?'text-yellow-400':'text-slate-300'} hover:text-yellow-400`;
}
async function enviarAvaliacao(id) {
  const nota = parseInt(document.getElementById('nota-val').value);
  if (!nota) { alert('Selecione uma nota.'); return; }
  const comentario = document.getElementById('coment-aval').value;
  const r = await fetch(`/api/chamados/${id}/avaliacao`,{method:'POST',headers:H,body:JSON.stringify({nota,comentario})});
  if (r.ok) abrirDetalhe(id);
}
async function enviarObs(id) {
  const obs = document.getElementById('txt-obs').value.trim();
  if (!obs) return;
  await fetch(`/api/chamados/${id}`,{method:'PUT',headers:H,body:JSON.stringify({observacao:obs})});
  abrirDetalhe(id);
}
async function enviarAnexo(id) {
  const f = document.getElementById('novo-anexo').files[0];
  if (!f) return;
  const fd = new FormData(); fd.append('arquivo',f);
  await fetch(`/api/chamados/${id}/anexos`,{method:'POST',headers:{'Authorization':`Bearer ${TOKEN}`},body:fd});
  abrirDetalhe(id);
}

// ─── Sugestões ────────────────────────────────────────────────
document.getElementById('form-sug').addEventListener('submit', async e => {
  e.preventDefault();
  const titulo = document.getElementById('s-titulo').value.trim();
  const descricao = document.getElementById('s-desc').value.trim();
  const categoria = document.getElementById('s-cat').value;
  if (!titulo||!descricao) { alert('Preencha título e descrição.'); return; }
  const r = await fetch('/api/sugestoes',{method:'POST',headers:H,body:JSON.stringify({titulo,descricao,categoria})});
  if (r.ok) { document.getElementById('form-sug').reset(); document.getElementById('form-sug-container').classList.add('hidden'); carregarSugestoes(); }
});

async function carregarSugestoes() {
  const lista = await api('/api/sugestoes');
  if (!lista) return;
  const el = document.getElementById('lista-sugestoes');
  if (!lista.length) { el.innerHTML='<div class="text-center py-10 text-slate-400"><p>Nenhuma sugestão registrada.</p></div>'; return; }
  const cores = {'Aberta':'bg-blue-100 text-blue-700','Em Análise':'bg-amber-100 text-amber-700','Aprovada':'bg-green-100 text-green-700','Implementada':'bg-emerald-100 text-emerald-700','Recusada':'bg-red-100 text-red-700'};
  el.innerHTML = lista.map(s=>`
    <div class="bg-white rounded-xl border border-slate-200 p-4">
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1"><span class="text-xs px-2 py-0.5 rounded-full font-medium ${cores[s.status]||'bg-slate-100 text-slate-700'}">${s.status}</span><span class="text-xs text-slate-400">${s.categoria}</span></div>
          <h3 class="font-semibold text-slate-800">${s.titulo}</h3>
          <p class="text-sm text-slate-500 mt-1 line-clamp-2">${s.descricao}</p>
          <p class="text-xs text-slate-400 mt-1">${fmtData(s.criado_em)}</p>
        </div>
      </div>
    </div>`).join('');
}

// ─── Notificações ─────────────────────────────────────────────
async function carregarNotificacoes() {
  const data = await api('/api/notificacoes');
  if (!data) return;
  atualizarBadge(data.nao_lidas);
  const el = document.getElementById('lista-notif');
  if (!data.notificacoes.length) { el.innerHTML='<p class="text-slate-400 text-center py-8">Nenhuma notificação.</p>'; return; }
  el.innerHTML = data.notificacoes.map(n=>`
    <div class="bg-white rounded-xl border ${n.lida?'border-slate-200':'border-blue-200 bg-blue-50'} p-4">
      <div class="flex items-start justify-between gap-3">
        <div><p class="text-sm font-medium ${n.lida?'text-slate-700':'text-blue-800'}">${n.titulo}</p><p class="text-xs text-slate-500 mt-0.5">${n.mensagem}</p></div>
        <p class="text-xs text-slate-400 flex-shrink-0">${fmtData(n.criado_em)}</p>
      </div>
    </div>`).join('');
}
async function marcarLidas() {
  await fetch('/api/notificacoes/marcar-lidas',{method:'PUT',headers:H});
  carregarNotificacoes();
}
function atualizarBadge(n) {
  const b = document.getElementById('badge-notif');
  const bm = document.getElementById('badge-notif-m');
  if (n>0) { b.textContent=n>9?'9+':n; b.classList.remove('hidden'); bm.classList.remove('hidden'); }
  else { b.classList.add('hidden'); bm.classList.add('hidden'); }
}
function pollNotificacoes() {
  setInterval(async()=>{
    const data = await api('/api/notificacoes');
    if (data) atualizarBadge(data.nao_lidas);
  }, 30000);
}

// ─── Perfil ───────────────────────────────────────────────────
async function carregarPerfil() {
  const u = await api('/api/auth/me');
  if (!u) return;
  document.getElementById('info-perfil').innerHTML = `
    <div class="flex justify-between"><span class="text-slate-500">Nome</span><span class="font-medium">${u.nome}</span></div>
    <div class="flex justify-between"><span class="text-slate-500">E-mail</span><span>${u.email}</span></div>
    <div class="flex justify-between"><span class="text-slate-500">Setor</span><span>${u.setor}</span></div>
    ${u.cargo?`<div class="flex justify-between"><span class="text-slate-500">Cargo</span><span>${u.cargo}</span></div>`:''}
    <div class="flex justify-between"><span class="text-slate-500">Perfil</span><span class="capitalize">${u.role}</span></div>
  `;
}
document.getElementById('form-senha').addEventListener('submit', async e => {
  e.preventDefault();
  const erroEl = document.getElementById('erro-senha');
  erroEl.classList.add('hidden');
  document.getElementById('ok-senha').classList.add('hidden');
  const r = await fetch('/api/auth/senha',{method:'PUT',headers:H,body:JSON.stringify({senha_atual:document.getElementById('s-atual').value,senha_nova:document.getElementById('s-nova').value})});
  const data = await r.json();
  if (!r.ok) { erroEl.textContent=data.erro; erroEl.classList.remove('hidden'); }
  else { document.getElementById('ok-senha').classList.remove('hidden'); document.getElementById('form-senha').reset(); }
});

// ─── Helpers ──────────────────────────────────────────────────
function bs(s){return{'Aberto':'bg-blue-100 text-blue-700','Em Andamento':'bg-amber-100 text-amber-700','Aguardando Usuario':'bg-purple-100 text-purple-700','Concluido':'bg-green-100 text-green-700','Cancelado':'bg-red-100 text-red-700'}[s]||'bg-slate-100 text-slate-700';}
function bp(p){return{'Critica':'bg-red-100 text-red-700','Alta':'bg-orange-100 text-orange-700','Media':'bg-yellow-100 text-yellow-700','Baixa':'bg-green-100 text-green-700'}[p]||'bg-slate-100 text-slate-700';}
function fmtData(d){if(!d)return'';try{return new Date(d.replace(' ','T')).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch{return d;}}

init();
</script>
