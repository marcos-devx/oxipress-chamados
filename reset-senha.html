<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Redefinir Senha – Chamados TI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Redefinir Senha</h1>
      <p class="text-slate-500 text-sm mt-1">Chamados TI – Oxipress</p>
    </div>

    <div id="secaoForm">
      <div id="erro" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg"></div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Nova senha</label>
          <div class="relative">
            <input id="senha" type="password" placeholder="Minimo 6 caracteres" autocomplete="new-password"
              class="w-full border border-slate-300 rounded-lg px-3 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="button" id="toggleSenha" tabindex="-1"
              class="absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 hover:text-slate-700"
              aria-label="Mostrar senha">
              <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
              <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
              </svg>
            </button>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar nova senha</label>
          <input id="confirmar" type="password" placeholder="Repita a nova senha" autocomplete="new-password"
            class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button id="btn" type="button"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition">
          Salvar nova senha
        </button>
      </div>
    </div>

    <div id="secaoSucesso" class="hidden text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
        <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-slate-800 mb-2">Senha redefinida!</h2>
      <p class="text-slate-500 text-sm mb-6">Sua senha foi alterada com sucesso.</p>
      <a href="login.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg transition">
        Ir para o login
      </a>
    </div>

    <div id="secaoInvalido" class="hidden text-center">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-red-100 rounded-full mb-4">
        <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-slate-800 mb-2">Link invalido ou expirado</h2>
      <p class="text-slate-500 text-sm mb-6">Solicite um novo link de redefinicao de senha.</p>
      <a href="login.html" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2.5 rounded-lg transition">
        Voltar ao login
      </a>
    </div>
  </div>
<script>
var token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('secaoForm').classList.add('hidden');
  document.getElementById('secaoInvalido').classList.remove('hidden');
}

document.getElementById('toggleSenha').addEventListener('click', function() {
  var inp = document.getElementById('senha');
  var open = document.getElementById('eyeOpen');
  var closed = document.getElementById('eyeClosed');
  if (inp.type === 'password') { inp.type = 'text'; open.classList.add('hidden'); closed.classList.remove('hidden'); }
  else { inp.type = 'password'; open.classList.remove('hidden'); closed.classList.add('hidden'); }
});

document.getElementById('btn').addEventListener('click', async function() {
  var senha = document.getElementById('senha').value;
  var confirmar = document.getElementById('confirmar').value;
  var erro = document.getElementById('erro');
  var btn = document.getElementById('btn');
  erro.classList.add('hidden');
  if (senha.length < 6) { erro.textContent = 'A senha deve ter pelo menos 6 caracteres.'; erro.classList.remove('hidden'); return; }
  if (senha !== confirmar) { erro.textContent = 'As senhas nao conferem.'; erro.classList.remove('hidden'); return; }
  btn.disabled = true; btn.textContent = 'Salvando...';
  var res = await fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ token: token, senha: senha })
  });
  var data = await res.json();
  if (!res.ok) {
    erro.textContent = data.erro || 'Link invalido ou expirado.';
    erro.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Salvar nova senha';
    if (res.status === 400 && data.erro && data.erro.includes('invalido')) {
      document.getElementById('secaoForm').classList.add('hidden');
      document.getElementById('secaoInvalido').classList.remove('hidden');
    }
    return;
  }
  document.getElementById('secaoForm').classList.add('hidden');
  document.getElementById('secaoSucesso').classList.remove('hidden');
});
</script>
</body>
</html>
